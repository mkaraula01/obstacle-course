name: Auto-version release

# Every push to main auto-bumps the patch version, tags it, and publishes a new
# GitHub Release with all native installers. The bump/tag/build/publish all run
# in THIS workflow run (no PAT needed) — the bot's bump commit carries
# "[skip ci]" so it doesn't loop, and a push with "[skip release]" in the
# message skips the whole thing.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs so two quick pushes don't race on the version bump/tag.
concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  version:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Bump patch version, commit and tag
        id: bump
        run: |
          set -e
          OLD=$(node -e "console.log(require('./package.json').version)")
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')
          BASE=${LATEST:-$OLD}
          NEW=$(node -e "const v=process.argv[1].split('.'); v[2]=(+v[2]+1); console.log(v.join('.'))" "$BASE")
          echo "current package.json=$OLD, latest tag=${LATEST:-none} -> new=$NEW"
          for f in package.json app.json src-tauri/tauri.conf.json; do
            sed -i "s/\"version\": \"$OLD\"/\"version\": \"$NEW\"/" "$f"
          done
          # Only the two root version fields in the lockfile (first two matches).
          sed -i "0,/\"version\": \"$OLD\"/s//\"version\": \"$NEW\"/" package-lock.json
          sed -i "0,/\"version\": \"$OLD\"/s//\"version\": \"$NEW\"/" package-lock.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "release: v$NEW [skip ci]"
          git tag "v$NEW"
          git push origin HEAD:main
          git push origin "v$NEW"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

  android-apk:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Generate native android project
        run: npx expo prebuild --platform android --no-install
      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android
      - uses: actions/upload-artifact@v4
        with:
          name: build-android
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  macos-dmg:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Build desktop app (.dmg) via Tauri
        run: npm run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  windows:
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}
      - run: npm ci
      - name: Build Windows installers (${{ matrix.arch }}) via Tauri
        run: npm run tauri:build -- --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-windows-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error

  linux:
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x64
          - runner: ubuntu-22.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: linux-${{ matrix.arch }}
      - run: npm ci
      - name: Build Linux .deb (${{ matrix.arch }})
        run: npm run tauri:build -- --bundles deb
      - name: Build Linux AppImage (${{ matrix.arch }}, best-effort)
        run: npm run tauri:build -- --bundles appimage
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: build-linux-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    # Single writer: collect every platform's artifacts and publish one Release.
    needs: [version, android-apk, macos-dmg, windows, linux]
    if: ${{ always() && needs.version.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List collected artifacts
        run: ls -lhR artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: artifacts/**/*
          body_path: .github/RELEASE_NOTES.md
          fail_on_unmatched_files: false
